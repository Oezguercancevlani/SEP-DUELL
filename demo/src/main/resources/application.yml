spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/registration
    #url: jdbc:postgresql://postgresqldb:5432/registration
    username: postgres
    password: CHANGE_ME_DB_PASSWORD
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: CHANGE_ME_MAIL_USERNAME
    password: CHANGE_ME_MAIL_APP_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true